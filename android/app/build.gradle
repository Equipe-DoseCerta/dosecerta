apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"
apply plugin: 'com.google.firebase.crashlytics'






react {
    autolinkLibrariesWithApp()
}

// ===============================================
// 🚀 BLOCO DE AUTOMAÇÃO DE VERSIONAMENTO (OTIMIZADO)
// O versionCode (número inteiro) é calculado a partir do versionName (string).
// Fórmula (X.Y.Z -> X*10000 + Y*100 + Z): 1.0.4 -> 10004, 1.0.5 -> 10005.
// ===============================================
def getVersionProps() {
    def versionProps = [:]
    def versionPropsFile = new File(rootDir, '../package.json')
    if (versionPropsFile.exists()) {
        def jsonText = versionPropsFile.text
        def json = new groovy.json.JsonSlurper().parseText(jsonText)
        versionProps.versionName = json.version

        def versionParts = json.version.tokenize('.')
        def major = versionParts.size() > 0 ? versionParts[0].toInteger() : 0
        def minor = versionParts.size() > 1 ? versionParts[1].toInteger() : 0
        def patch = versionParts.size() > 2 ? versionParts[2].toInteger() : 0

        versionProps.versionCode = major * 10000 + minor * 100 + patch
    } else {
        throw new GradleException("Could not find package.json at ${rootDir}")
    }
    return versionProps
}

def versionProps = getVersionProps()
// ===============================================


/**
 * Habilita o ProGuard/R8 no build de release para gerar mapping.txt
 */
def enableProguardInReleaseBuilds = true

/**
 * Define a engine JS padrão (Hermes/JSC)
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.dosecerta"

    defaultConfig {
        applicationId "com.dosecerta"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion

        // 🚀 Versão automática a partir do package.json
        versionCode versionProps.versionCode
        versionName versionProps.versionName
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('MYAPP_RELEASE_STORE_FILE')) {
                storeFile file(MYAPP_RELEASE_STORE_FILE)
                storePassword MYAPP_RELEASE_STORE_PASSWORD
                keyAlias MYAPP_RELEASE_KEY_ALIAS
                keyPassword MYAPP_RELEASE_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release

            // ⚙️ Ativa R8 (minify) e shrinkResources
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources true

            // Usa o arquivo otimizado + regras personalizadas
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        pickFirst 'lib/arm64-v8a/libworklets.so'
        pickFirst 'lib/armeabi-v7a/libworklets.so'
        pickFirst 'lib/x86/libworklets.so'
        pickFirst 'lib/x86_64/libworklets.so'
    }
}



configurations.all {
    resolutionStrategy {
        // FORÇA A EXCLUSÃO DE BIBLIOTECAS LEGADAS (ANDROID SUPPORT)
        // Isso resolve o erro 'Duplicate class android.support.v4...'
        exclude group: 'com.android.support', module: 'support-v4'
        exclude group: 'com.android.support', module: 'support-compat'
        exclude group: 'com.android.support', module: 'support-core-ui'
        exclude group: 'com.android.support', module: 'support-fragment'
        exclude group: 'com.google.android.gms', module: 'play-services-ads-identifier'
    }
}

dependencies {
    // React Native core
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // ✅ AndroidX e Material Design
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'com.google.android.material:material:1.11.0'
    

    // Firebase BoM
    implementation(platform("com.google.firebase:firebase-bom:34.0.0"))
    
    
    // Firebase Analytics (opcional, mas recomendado)
    implementation("com.google.firebase:firebase-analytics")
    implementation("com.google.firebase:firebase-crashlytics")
    implementation("com.google.firebase:firebase-messaging")
    implementation("com.google.firebase:firebase-firestore")
    

    // ML Kit Image Labeling
    implementation 'com.google.mlkit:image-labeling:17.0.9'
}
